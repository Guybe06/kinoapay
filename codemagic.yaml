workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - keystore_credentials
    scripts:
      - name: Get packages
        script: flutter pub get
        working_directory: frontend/kinoapay_app
      - name: Build APK
        script: flutter build apk --release
        working_directory: frontend/kinoapay_app
    artifacts:
      - frontend/kinoapay_app/build/app/outputs/apk/release/*.apk

  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
    scripts:
      - name: Get packages
        script: flutter pub get
        working_directory: frontend/kinoapay_app
      - name: Install pods
        script: pod install
        working_directory: frontend/kinoapay_app/ios
      - name: Build IPA
        # L'option --no-codesign a été retirée car elle empêche la création du fichier .ipa.
        # Vous devez avoir configuré la signature (Code Signing) dans l'interface Codemagic.
        script: flutter build ipa --release --export-method ad-hoc
        working_directory: frontend/kinoapay_app
    artifacts:
      - frontend/kinoapay_app/build/ios/ipa/*.ipa
