name: kinoapay_app
description: "KINOAPAY P2P mobile money client app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^11.0.0
  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  solar_icons: ^0.0.5
  flutter_contacts: ^2.0.2
  permission_handler: ^12.0.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#c8964a"
  adaptive_icon_foreground: "assets/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/welcome.jpg
    - assets/images/welcome-2.jpg
    - assets/images/welcome-3.jpg
